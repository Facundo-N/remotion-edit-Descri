<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CapCut - Secuencia Pro (Camera Rig JS)</title>
    <style>
        :root {
            /* Curva de aceleración extraída de tu referencia (Estilo After Effects / CapCut) */
            --ease-pan: cubic-bezier(0.85, 0, 0.15, 1);
            --bg-color: #0f1115;
            --timeline-duration: 7s;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: white;
            background-image: radial-gradient(circle at 50% 50%, #1a1d24 0%, #050505 100%);
        }

        /* El "Null Object" de la cámara espacial */
        #camera-rig {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* La transición aplica el latigazo suave a TODO el mundo simultáneamente */
            transition: transform 1.2s var(--ease-pan);
            will-change: transform;
            transform-origin: 50% 50%;
        }

        /* Posicionamiento del lienzo 3D */
        .scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease-in-out;
            /* Para los cruces de Zoom */
            will-change: opacity;
        }

        /* --- UBICACIONES FÍSICAS EN EL MAPA ESPACIAL (PREPARACIÓN PARA TRANSICIONES) --- */

        /* ESCENA INICIAL: Origen de la cámara */
        #scene1 {
            transform: translate3d(0, 0, 0);
            z-index: 10;
            opacity: 1;
        }

        /* PARA LA TRANSICIÓN 1 (Smooth hacia Abajo): Ubicamos la Escena 2 físicamente ARRIBA (translateY negativo) */
        #scene2 {
            transform: translate3d(0, -100vh, 0);
            z-index: 10;
            opacity: 1;
        }

        /* PARA LA TRANSICIÓN 2 (Smooth hacia Arriba): Ubicamos la Escena 3 físicamente ABAJO (translateY positivo) */
        #scene3 {
            transform: translate3d(0, 100vh, 0);
            z-index: 10;
            opacity: 1;
        }

        /* PARA LAS TRANSICIONES 3 (Zoom In) y 4 (Zoom Out): Comparten exactamente el mismo lugar físico de la Escena 3, pero alteramos sus ESCALAS iniciales. */
        #scene4 {
            transform: translate3d(0, 100vh, 0) scale(0.25);
            z-index: 15;
            opacity: 0;
        }

        #scene5 {
            transform: translate3d(0, 100vh, 0) scale(1);
            z-index: 20;
            opacity: 0;
        }

        /* PARA LA TRANSICIÓN 5 (Lateral Izquierdo): Ubicamos la Escena 6 físicamente a la DERECHA (translateX positivo) de la Escena 5 */
        #scene6 {
            transform: translate3d(100vw, 100vh, 0);
            z-index: 10;
            opacity: 1;
        }


        /* --- DISEÑO DE LOS CLIPS (TARJETAS) --- */
        .clip {
            position: relative;
            width: 320px;
            height: 560px;
            background: #ffffff;
            color: #000;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-weight: 900;
            /* Transiciones internas del clip (Motion Blur y Drift) */
            transition: filter 0.6s var(--ease-pan), transform 2s linear;
            filter: blur(0px);
            transform: scale(1);
            overflow: hidden;
        }

        /* Efecto de "Drift" continuo (pequeño acercamiento mientras está en pantalla) */
        .scene.active .clip {
            transform: scale(1.04);
        }

        /* Motion blur activado por JS durante los latigazos */
        .clip.moving {
            filter: blur(15px);
        }

        .clip h2 {
            margin: 0;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: -1px;
            z-index: 2;
        }

        .clip p {
            font-size: 0.9rem;
            color: #666;
            margin: 5px 0 15px 0;
            z-index: 2;
        }

        .clip .emoji {
            font-size: 4rem;
            margin: 20px 0;
            z-index: 2;
            filter: drop-shadow(0 10px 10px rgba(0, 0, 0, 0.2));
        }

        #clip1 {
            background: radial-gradient(circle at top right, #fff, #e0e0e0);
        }

        #clip2 {
            background: #f0f0f0;
            background-image: radial-gradient(#ccc 2px, transparent 2px);
            background-size: 20px 20px;
        }

        #clip3 {
            background: linear-gradient(to bottom, #fff, #d4d4d4);
        }

        #clip4 {
            background: #fafafa;
            border: 4px solid #111;
        }

        #clip5 {
            background: #fff;
        }

        #clip6 {
            background: linear-gradient(135deg, #111, #000);
            color: #00ff88;
            border: 1px solid #333;
        }

        /* --- UI CONTROLS (Basado en tu referencia) --- */
        #ui-layer {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10000;
        }

        .controls-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111319;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #2a2d36;
        }

        .btn {
            background: white;
            color: black;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        #replay-btn {
            display: none;
        }

        #progress-container {
            width: 100%;
            height: 6px;
            background: #1e212a;
            border-radius: 4px;
            overflow: hidden;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: #00ff88;
        }

        .playing #progress-bar {
            width: 100%;
            transition: width 8.4s linear;
        }

        .timecode {
            font-family: monospace;
            font-size: 1.1rem;
            color: #ccc;
        }
    </style>
</head>

<body>

    <!-- MAPA ESPACIAL CONTINUO -->
    <div id="camera-rig">
        <div class="scene" id="scene1">
            <div class="clip" id="clip1">
                <!-- AGREGA TUS ELEMENTOS ACÁ (Escena 1) -->
                <p>Everyone is chasing</p>
                <h2>SHORTCUTS</h2>
            </div>
        </div>
        <div class="scene" id="scene2">
            <div class="clip" id="clip2">
                <!-- AGREGA TUS ELEMENTOS ACÁ (Escena 2) -->
                <div class="emoji">💊</div>
            </div>
        </div>
        <div class="scene" id="scene3">
            <div class="clip" id="clip3">
                <!-- AGREGA TUS ELEMENTOS ACÁ (Escena 3) -->
                <p>Here is the</p>
                <h2>TRUTH</h2>
                <div class="emoji">🖼️</div>
            </div>
        </div>
        <div class="scene" id="scene4">
            <div class="clip" id="clip4">
                <!-- AGREGA TUS ELEMENTOS ACÁ (Escena 4) -->
                <h2>NO MAGIC</h2>
                <div class="emoji">💊</div>
            </div>
        </div>
        <div class="scene" id="scene5">
            <div class="clip" id="clip5">
                <!-- AGREGA TUS ELEMENTOS ACÁ (Escena 5) -->
                <h2>HARDWORK</h2>
                <div class="emoji">➤</div>
            </div>
        </div>
        <div class="scene" id="scene6">
            <div class="clip" id="clip6">
                <!-- AGREGA TUS ELEMENTOS ACÁ (Escena 6) -->
                <h2>ÉXITO</h2>
                <div class="emoji">🎬</div>
            </div>
        </div>
    </div>

    <!-- UI DE REPRODUCCIÓN -->
    <div id="ui-layer">
        <div class="controls-header">
            <div>
                <button id="start-btn" class="btn">▶ PLAY (8.4s)</button>
                <button id="replay-btn" class="btn">↺ REPLAY</button>
            </div>
            <div class="timecode" id="timecode">00:00.0 / 00:08.4</div>
        </div>
        <div class="timecode" id="timecode">00:00.0 / 00:07.0</div>
    </div>
    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const camera = document.getElementById('camera-rig');
            const startBtn = document.getElementById('start-btn');
            const replayBtn = document.getElementById('replay-btn');
            const timecode = document.getElementById('timecode');

            let timelineTimeouts = [];
            let startTime;
            let animationFrame;
            const totalDuration = 8400;

            function updateTimecode() {
                const elapsed = Date.now() - startTime;
                if (elapsed <= totalDuration) {
                    timecode.textContent = `00:${(elapsed / 1000).toFixed(1).padStart(4, '0')} / 00:08.4`;
                    animationFrame = requestAnimationFrame(updateTimecode);
                } else {
                    timecode.textContent = `00:08.4 / 00:08.4`;
                }
            }

            // Aplica Motion Blur y luego lo quita dinámicamente
            function triggerMotionBlur(clipIds) {
                clipIds.forEach(id => {
                    const clip = document.getElementById(id);
                    clip.classList.add('moving');
                    setTimeout(() => clip.classList.remove('moving'), 800);
                });
            }

            // COREOGRAFÍA JS (Basado en la lógica de tu archivo de referencia)
            function playSequence() {
                document.body.classList.add('playing');
                startBtn.style.display = 'none';
                replayBtn.style.display = 'none';

                startTime = Date.now();
                updateTimecode();

                // Estado Inicial (Escena 1)
                camera.style.transform = 'translate3d(0, 0, 0) scale(1)';
                document.getElementById('scene1').classList.add('active');

                // --- TRANSICIÓN 1: SMOOTH HACIA ABAJO (T=1.4s) ---
                // La cámara se desplaza 100vh hacia ABAJO. Al bajar la cámara, enfoca la Escena 2 que estaba escondida arriba.
                timelineTimeouts.push(setTimeout(() => {
                    camera.style.transform = 'translate3d(0, 100vh, 0) scale(1)';
                    document.getElementById('scene1').classList.remove('active');
                    document.getElementById('scene2').classList.add('active');
                    triggerMotionBlur(['clip1', 'clip2']);
                }, 1400));

                // --- TRANSICIÓN 2: SMOOTH HACIA ARRIBA (T=2.8s) ---
                // La cámara da un latigazo hacia ARRIBA (-100vh), pasando por el medio y revelando la Escena 3 que estaba abajo.
                timelineTimeouts.push(setTimeout(() => {
                    camera.style.transform = 'translate3d(0, -100vh, 0) scale(1)';
                    document.getElementById('scene2').classList.remove('active');
                    document.getElementById('scene3').classList.add('active');
                    triggerMotionBlur(['clip2', 'clip3']);
                }, 2800));

                // --- TRANSICIÓN 3: ACERCAMIENTO / ZOOM IN (T=4.2s) ---
                // La cámara no se desplaza, solo hace un ZOOM 4x sobre el mismo lugar. Revela la Escena 4 (que tenía escala 0.25).
                timelineTimeouts.push(setTimeout(() => {
                    camera.style.transform = 'translate3d(0, -100vh, 0) scale(4)';

                    document.getElementById('scene3').style.opacity = '0'; // Fundido
                    document.getElementById('scene4').style.opacity = '1';

                    document.getElementById('scene3').classList.remove('active');
                    document.getElementById('scene4').classList.add('active');
                    triggerMotionBlur(['clip3', 'clip4']);
                }, 4200));

                // --- TRANSICIÓN 4: ALEJAMIENTO / ZOOM OUT (T=5.6s) ---
                // La cámara quita el zoom regresando a su escala original (1x). Aparece la Escena 5 desde atrás ocupando su tamaño real.
                timelineTimeouts.push(setTimeout(() => {
                    camera.style.transform = 'translate3d(0, -100vh, 0) scale(1)';

                    document.getElementById('scene4').style.opacity = '0';
                    document.getElementById('scene5').style.opacity = '1';

                    document.getElementById('scene4').classList.remove('active');
                    document.getElementById('scene5').classList.add('active');
                    triggerMotionBlur(['clip4', 'clip5']);
                }, 5600));

                // --- TRANSICIÓN 5: LATERAL IZQUIERDO (T=7.0s) ---
                // La cámara se desplaza hacia la DERECHA (-100vw). Esto genera el efecto de que todo en pantalla sale disparado hacia la IZQUIERDA.
                timelineTimeouts.push(setTimeout(() => {
                    camera.style.transform = 'translate3d(-100vw, -100vh, 0) scale(1)';
                    document.getElementById('scene5').classList.remove('active');
                    document.getElementById('scene6').classList.add('active');
                    triggerMotionBlur(['clip5', 'clip6']);
                }, 7000));

                // FIN: T=8.4s
                timelineTimeouts.push(setTimeout(() => {
                    document.body.classList.remove('playing');
                    replayBtn.style.display = 'inline-block';
                }, 8400));
            }

            function resetAnimation() {
                timelineTimeouts.forEach(clearTimeout);
                timelineTimeouts = [];
                cancelAnimationFrame(animationFrame);

                document.body.classList.remove('playing');
                timecode.textContent = `00:00.0 / 00:08.4`;

                // Resetear Posiciones
                document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));

                camera.style.transition = 'none'; // Quitar transición para teletransporte instantáneo
                camera.style.transform = 'translate3d(0, 0, 0) scale(1)';

                document.getElementById('scene3').style.opacity = '1';
                document.getElementById('scene4').style.opacity = '0';
                document.getElementById('scene5').style.opacity = '0';

                // Forzar reflow para aplicar el salto
                void camera.offsetWidth;

                camera.style.transition = 'transform 1.2s var(--ease-pan)'; // Restaurar

                setTimeout(playSequence, 100);
            }

            startBtn.addEventListener('click', playSequence);
            replayBtn.addEventListener('click', resetAnimation);
        });
    </script>
</body>

</html>
