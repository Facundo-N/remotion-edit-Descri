<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smooth Reel 8-Sec Clone</title>
    <!-- Usamos Inter, la fuente por excelencia para este estilo minimalista -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* Variables de Easing que imitan After Effects (F9 / Graph Editor) */
        :root {
            /* REVERTIDO: Animación original rápida, seca y sin rebote */
            --ease-pan: cubic-bezier(0.85, 0, 0.15, 1);
            
            --ease-pop: cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Rebote elástico para textos */
            --ease-drop: cubic-bezier(0.25, 1, 0.5, 1); /* Caída suave Apple-style */
            --bg-light: #f4f4f5;
            --text-dark: #0a0a0a;
            --accent: #ff4500;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-light);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            color: var(--text-dark);
        }

        /* Textura de ruido procedimental para un look premium */
        .noise-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 9999; opacity: 0.04; mix-blend-mode: multiply;
        }

        /* El "Null Object" de la cámara que moveremos por la grilla */
        #camera-rig {
            position: absolute; top: 0; left: 0;
            width: 200vw; height: 200vh;
            display: grid;
            grid-template-columns: 100vw 100vw;
            grid-template-rows: 100vh 100vh;
            /* La transición ahora usa la variable con el bounce sutil */
            transition: transform 1.2s var(--ease-pan);
            will-change: transform;
        }

        .scene {
            position: relative; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center; flex-direction: column;
            overflow: hidden;
        }

        /* Ubicación explícita de las escenas en la grilla para la ruta de la cámara */
        #scene1 { grid-column: 1; grid-row: 1; background: var(--bg-light); }
        #scene2 { grid-column: 2; grid-row: 1; background: #e5e5e5; }
        #scene3 { grid-column: 2; grid-row: 2; background: #d4d4d8; }
        #scene4 { grid-column: 1; grid-row: 2; background: var(--text-dark); }

        /* Controles Globales de UI */
        #ui-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10000;
            display: flex; justify-content: center; align-items: center;
        }

        .btn {
            pointer-events: auto;
            padding: 18px 40px; font-size: 20px; font-weight: 900; letter-spacing: -0.02em;
            background: var(--text-dark); color: white; border: none; border-radius: 50px;
            cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.3s var(--ease-pop); text-transform: uppercase;
        }
        .btn:hover { transform: scale(1.05) translateY(-2px); box-shadow: 0 15px 40px rgba(0,0,0,0.3); }
        
        #replay-btn { display: none; background: white; color: black; }

        /* Barra de progreso exacta de 8 segundos */
        #progress-bar {
            position: fixed; bottom: 0; left: 0; height: 6px; background: var(--accent);
            width: 0%; z-index: 10000;
        }
        .playing #progress-bar {
            width: 100%; transition: width 8s linear;
        }

        .s1-line {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 0px; height: 4px; background: var(--text-dark); border-radius: 2px;
            transition: width 0.8s var(--ease-pan); z-index: 10;
        }
        .s1-text-wrapper {
            position: absolute; left: 50%; transform: translateX(-50%);
            overflow: hidden; height: 12vw; width: 90vw;
            display: flex; justify-content: center;
        }
        .s1-wrapper-top { bottom: 50%; align-items: flex-end; padding-bottom: 2px; }
        .s1-wrapper-bottom { top: 50%; align-items: flex-start; padding-top: 2px; }
        
        .s1-text {
            font-size: 10vw; font-weight: 900; line-height: 1; letter-spacing: -0.04em; margin: 0;
            will-change: transform;
        }
        .s1-text-top { transform: translateY(100%); transition: transform 0.8s var(--ease-pan); }
        .s1-text-bottom { transform: translateY(-100%); transition: transform 0.8s var(--ease-pan); }

        .s2-text-container { perspective: 1000px; display: flex; flex-direction: column; align-items: center;}
        .s2-text {
            font-size: 13vw; font-weight: 900; line-height: 0.9; letter-spacing: -0.05em;
            transform: rotateX(60deg) translateY(100px) scale(0.5); 
            opacity: 0; filter: blur(20px);
            transition: all 1.2s var(--ease-pop);
            text-shadow: 
                3px 0 0 rgba(255,0,0,0.5), 
                -3px 0 0 rgba(0,255,255,0.5),
                0 10px 20px rgba(0,0,0,0.2);
        }
        .s2-sub { color: var(--accent); }
        
        #scene2.active .s2-text {
            transform: rotateX(0deg) translateY(0) scale(1);
            opacity: 1; filter: blur(0);
        }
        #scene2.active .s2-text:nth-child(2) { transition-delay: 0.1s; }

        .s3-text {
            font-size: 9vw; font-weight: 900; letter-spacing: -0.05em; text-align: center;
            transform: scale(3) translateY(-50px); opacity: 0; filter: blur(30px);
            transition: all 1s var(--ease-drop); z-index: 20;
        }
        #scene3.active .s3-text {
            transform: scale(1) translateY(0); opacity: 1; filter: blur(0);
        }
        .scatter-shapes-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 1px; height: 1px; z-index: 10;
        }
        .shape {
            position: absolute; top: -15px; left: -15px; width: 30px; height: 30px;
            opacity: 0; transition: all 1.2s var(--ease-drop);
            will-change: transform, opacity;
        }
        /* Las formas se dispersan dinámicamente vía JS */
        #scene3.active .shape.exploded { opacity: 1; }

        .s4-circle-mask {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 0; height: 0; border-radius: 50%; background: var(--text-dark);
            transition: width 1s var(--ease-pan), height 1s var(--ease-pan); z-index: 1;
        }
        #scene4.active .s4-circle-mask {
            width: 300vw; height: 300vw;
        }
        .s4-text {
            color: white; font-size: 14vw; font-weight: 900; letter-spacing: -0.06em;
            opacity: 0; transform: scale(0.8); z-index: 10;
            transition: all 0.8s var(--ease-pop) 0.4s;
        }
        #scene4.active .s4-text { opacity: 1; transform: scale(1); }

    </style>
</head>
<body>
    <!-- Textura Global -->
    <svg style="display:none;">
        <filter id="noise">
            <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/>
        </filter>
    </svg>
    <div class="noise-overlay" style="filter: url(#noise);"></div>

    <!-- Indicador Global de Tiempo -->
    <div id="progress-bar"></div>

    <!-- Interfaz Superpuesta -->
    <div id="ui-layer">
        <button id="start-btn" class="btn">PLAY ANIMATION (8s)</button>
        <button id="replay-btn" class="btn">REPLAY</button>
    </div>

    <!-- Grilla de Cámara -->
    <div id="camera-rig">
        
        <!-- Escena 1: 0.0s a 2.5s -->
        <div id="scene1" class="scene">
            <div class="s1-line"></div>
            <div class="s1-text-wrapper s1-wrapper-top">
                <div class="s1-text s1-text-top">SMOOTH</div>
            </div>
            <div class="s1-text-wrapper s1-wrapper-bottom">
                <div class="s1-text s1-text-bottom">ANIMATIONS</div>
            </div>
        </div>

        <!-- Escena 2: 2.5s a 4.2s -->
        <div id="scene2" class="scene">
            <div class="s2-text-container">
                <div class="s2-text">VIRAL</div>
                <div class="s2-text s2-sub">REELS</div>
            </div>
        </div>

        <!-- Escena 3: 4.2s a 6.2s -->
        <div id="scene3" class="scene">
            <div class="scatter-shapes-container" id="shapes-container"></div>
            <div class="s3-text">IN JUST<br>8 SECONDS</div>
        </div>

        <!-- Escena 4: 6.2s a 8.0s -->
        <div id="scene4" class="scene">
            <!-- La máscara simula una expansión hacia adentro -->
            <div class="s4-circle-mask"></div>
            <div class="s4-text">BOOM.</div>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const startBtn = document.getElementById('start-btn');
            const replayBtn = document.getElementById('replay-btn');
            const camera = document.getElementById('camera-rig');
            const body = document.body;
            let timelineTimeouts = [];

            // Generador de Formas para la Escena 3
            function generateShapes() {
                const container = document.getElementById('shapes-container');
                container.innerHTML = '';
                const colors = ['#ff4500', '#2563eb', '#10b981', '#f59e0b', '#0a0a0a'];
                
                for(let i=0; i<40; i++) {
                    let shape = document.createElement('div');
                    shape.className = 'shape';
                    let type = Math.random();
                    
                    // Mezcla de Círculos, Cuadrados y Triángulos CSS
                    if(type < 0.33) {
                        shape.style.borderRadius = '50%';
                        shape.style.background = colors[i % colors.length];
                    } else if(type < 0.66) {
                        shape.style.background = colors[i % colors.length];
                    } else {
                        shape.style.width = '0'; shape.style.height = '0';
                        shape.style.background = 'transparent';
                        shape.style.borderLeft = '15px solid transparent';
                        shape.style.borderRight = '15px solid transparent';
                        shape.style.borderBottom = `25px solid ${colors[i % colors.length]}`;
                    }

                    // Calcular físicas pre-renderizadas (Destino final de dispersión)
                    let angle = Math.random() * Math.PI * 2;
                    let distance = 150 + Math.random() * 60 * vw(); 
                    let tx = Math.cos(angle) * distance;
                    let ty = Math.sin(angle) * distance;
                    let rot = (Math.random() - 0.5) * 720; // Rotación loca
                    
                    shape.dataset.tx = tx;
                    shape.dataset.ty = ty;
                    shape.dataset.rot = rot;
                    
                    container.appendChild(shape);
                }
            }

            function vw() { return window.innerWidth / 100; }

            // Controlador Central de Animación (Timeline exacto de 8 Segundos)
            function playAnimation() {
                // Limpiar estado
                startBtn.style.display = 'none';
                replayBtn.style.display = 'none';
                body.classList.add('playing');

                // Variables de nodos
                const s1Line = document.querySelector('.s1-line');
                const s1Top = document.querySelector('.s1-text-top');
                const s1Bot = document.querySelector('.s1-text-bottom');

                // --- T=0.2s: La línea se expande desde el centro ---
                timelineTimeouts.push(setTimeout(() => {
                    s1Line.style.width = '70vw';
                }, 200));

                // --- T=0.6s: El texto emerge de detrás de la línea (Máscara) ---
                timelineTimeouts.push(setTimeout(() => {
                    s1Top.style.transform = 'translateY(0)';
                    s1Bot.style.transform = 'translateY(0)';
                }, 600));

                // --- T=2.5s: PANEO A LA DERECHA (Escena 2) ---
                timelineTimeouts.push(setTimeout(() => {
                    camera.style.transform = 'translate(-100vw, 0)';
                    document.getElementById('scene2').classList.add('active');
                }, 2500));

                // --- T=4.2s: PANEO HACIA ABAJO (Escena 3) ---
                timelineTimeouts.push(setTimeout(() => {
                    camera.style.transform = 'translate(-100vw, -100vh)';
                    document.getElementById('scene3').classList.add('active');
                    
                    // Disparar explosión de partículas
                    document.querySelectorAll('.shape').forEach(shape => {
                        shape.classList.add('exploded');
                        shape.style.transform = `translate(${shape.dataset.tx}px, ${shape.dataset.ty}px) rotate(${shape.dataset.rot}deg) scale(${Math.random() + 0.5})`;
                    });
                }, 4200));

                // --- T=6.2s: PANEO A LA IZQUIERDA (Escena 4 - Fin de ruta) ---
                timelineTimeouts.push(setTimeout(() => {
                    camera.style.transform = 'translate(0, -100vh)';
                    document.getElementById('scene4').classList.add('active');
                }, 6200));

                // --- T=8.0s: Fin de Secuencia Exacto ---
                timelineTimeouts.push(setTimeout(() => {
                    body.classList.remove('playing');
                    replayBtn.style.display = 'block';
                    // Pequeño pop para el botón de replay
                    replayBtn.style.animation = 'none';
                    void replayBtn.offsetWidth; 
                }, 8000));
            }

            function resetAnimation() {
                // Matar timeouts en curso por si acaso
                timelineTimeouts.forEach(clearTimeout);
                timelineTimeouts = [];
                body.classList.remove('playing');

                // Resetear Clases y Estilos a estado 0
                document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
                camera.style.transition = 'none';
                camera.style.transform = 'translate(0, 0)';
                
                document.querySelector('.s1-line').style.width = '0px';
                document.querySelector('.s1-text-top').style.transform = 'translateY(100%)';
                document.querySelector('.s1-text-bottom').style.transform = 'translateY(-100%)';

                document.querySelectorAll('.shape').forEach(shape => {
                    shape.classList.remove('exploded');
                    shape.style.transform = 'translate(0,0) rotate(0deg) scale(0)';
                });

                // Forzar reflow del navegador para aplicar el salto sin transición
                void camera.offsetWidth;
                
                // Restaurar transición de cámara principal
                camera.style.transition = 'transform 1.2s var(--ease-pan)';

                // Iniciar de nuevo tras un pequeñísimo delay
                setTimeout(playAnimation, 100);
            }

            // Inicialización
            generateShapes();
            startBtn.addEventListener('click', playAnimation);
            replayBtn.addEventListener('click', resetAnimation);
            
            // Recalcular formas si cambian el tamaño de la ventana
            window.addEventListener('resize', generateShapes);
        });
    </script>
</body>
</html>
