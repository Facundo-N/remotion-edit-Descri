<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motion Graphics: Taza Minimalista</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #D1D1D1;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
        }

        #scene-container {
            width: 600px;
            height: 600px;
            position: relative;
        }

        svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }
    </style>
</head>

<body>

    <div id="scene-container">
        <svg viewBox="0 0 600 600" id="scene">

            <defs>
                <clipPath id="body-mask">
                    <path d="M 210 240 L 390 240 L 354 370 C 344 388, 256 388, 246 370 Z" />
                </clipPath>
                <!-- MÁSCARA LIMPIA: Solo recorta el café en el borde exacto de la taza -->
                <clipPath id="rim-mask">
                    <ellipse cx="300" cy="240" rx="86" ry="22" />
                </clipPath>
            </defs>

            <!-- SUELO: Brillo blanco y Sombra dura -->
            <ellipse cx="300" cy="460" rx="130" ry="35" fill="#FFFFFF" opacity="0.6" id="floor-glow" />
            <ellipse id="shadow" cx="300" cy="460" rx="60" ry="14" fill="#262626" />

            <!-- CONTENEDOR PRINCIPAL DE LA TAZA -->
            <g id="master-cup">

                <!-- GRUPO DEL ASA -->
                <g id="handle-group">
                    <path d="M 370 260 C 450 260, 440 340, 350 340" fill="none" stroke="#FFFFFF" stroke-width="26"
                        stroke-linecap="round" />
                    <path id="handle-shadow" d="M 370 260 C 450 260, 440 340, 350 340" fill="none" stroke="#E0E0E0"
                        stroke-width="10" stroke-linecap="round" />
                </g>

                <!-- CUERPO PRINCIPAL CON SOMBRA -->
                <g id="cup-body-group">
                    <path d="M 210 240 L 390 240 L 354 370 C 344 388, 256 388, 246 370 Z" fill="#FFFFFF" />
                    <rect id="body-shadow" x="330" y="240" width="80" height="160" fill="#E0E0E0"
                        clip-path="url(#body-mask)" />
                </g>

                <!-- BASE INFERIOR (Aparece en el impacto) -->
                <g id="cup-bottom-group" opacity="0">
                    <ellipse cx="300" cy="374" rx="55" ry="16" fill="#757575" />
                    <ellipse cx="300" cy="378" rx="45" ry="12" fill="#5C5C5C" />
                </g>

                <!-- APERTURA SUPERIOR RESTAURADA AL ESTILO FOTO 2 -->
                <g id="top-opening">
                    <!-- Borde exterior (Superficie blanca de la taza) -->
                    <ellipse cx="300" cy="240" rx="90" ry="25" fill="#FFFFFF" />

                    <!-- LÍQUIDO CON MÁSCARA INTELIGENTE -->
                    <g clip-path="url(#rim-mask)">
                        <!-- Fondo negro absoluto para que al rotar la superficie no queden huecos blancos -->
                        <rect x="100" y="100" width="400" height="400" fill="#1C1C1C" />

                        <!-- Contenedor del líquido animado (slosh) -->
                        <g id="liquid-surface-container">
                            <!-- Sombra de profundidad en el café -->
                            <path d="M 214 240 A 86 22 0 0 0 386 240 A 78 14 0 0 1 214 240 Z" fill="#000000"
                                opacity="0.3" />

                            <!-- Brillo cristalino (Idéntico a la foto de referencia) -->
                            <ellipse cx="260" cy="237" rx="18" ry="3" fill="#FFFFFF" opacity="0.25"
                                transform="rotate(-6 260 237)" />
                            <ellipse cx="285" cy="235" rx="3" ry="1.5" fill="#FFFFFF" opacity="0.2"
                                transform="rotate(-6 285 235)" />

                            <!-- Burbujas internas animadas -->
                            <g id="liquid-bubbles">
                                <circle cx="270" cy="246" r="2.5" fill="#FFFFFF" opacity="0.4" />
                                <circle cx="310" cy="241" r="1.5" fill="#FFFFFF" opacity="0.3" />
                                <circle cx="290" cy="250" r="2" fill="#FFFFFF" opacity="0.5" />
                                <circle cx="330" cy="245" r="3" fill="#FFFFFF" opacity="0.2" />
                                <circle cx="250" cy="243" r="1.5" fill="#FFFFFF" opacity="0.4" />
                            </g>
                        </g>
                    </g>
                </g>

                <!-- DOMO DE IMPACTO INICIAL CON BRILLO -->
                <g id="liquid-bulge-group" opacity="0">
                    <path d="M 214 240 C 220 220, 260 225, 290 230 C 310 140, 400 160, 386 240 Z" fill="#1C1C1C" />
                    <path d="M 270 225 C 290 160, 360 165, 370 230" fill="none" stroke="#FFFFFF" stroke-width="3"
                        stroke-linecap="round" opacity="0.25" />
                </g>

                <!-- ====== PARTÍCULAS INTERNAS (ANCLADAS A LA TAZA) ====== -->
                <!-- Caen perfectas al centro del café y no se salen nunca -->
                <g id="internal-particles">
                    <circle class="splash-impact" id="splash-imp-1" cx="300" cy="240" r="6" fill="#1C1C1C"
                        opacity="0" />
                    <circle class="splash-impact" id="splash-imp-2" cx="300" cy="240" r="4" fill="#1C1C1C"
                        opacity="0" />
                    <circle class="splash-impact" id="splash-imp-3" cx="300" cy="240" r="5" fill="#1C1C1C"
                        opacity="0" />
                    <circle class="splash-impact" id="splash-imp-4" cx="300" cy="240" r="3" fill="#1C1C1C"
                        opacity="0" />
                    <circle class="splash-impact" id="splash-imp-5" cx="300" cy="240" r="4.5" fill="#1C1C1C"
                        opacity="0" />
                    <circle class="splash-impact" id="splash-imp-6" cx="300" cy="240" r="3.5" fill="#1C1C1C"
                        opacity="0" />

                    <circle class="splash" id="splash-1" cx="300" cy="240" r="8" fill="#1C1C1C" opacity="0" />
                    <circle class="splash" id="splash-2" cx="300" cy="240" r="5" fill="#1C1C1C" opacity="0" />
                    <circle class="splash" id="splash-3" cx="300" cy="240" r="6" fill="#1C1C1C" opacity="0" />
                    <circle class="splash" id="splash-4" cx="300" cy="240" r="4" fill="#1C1C1C" opacity="0" />
                    <circle class="splash" id="splash-5" cx="300" cy="240" r="3.5" fill="#1C1C1C" opacity="0" />
                    <circle class="splash" id="splash-6" cx="300" cy="240" r="5" fill="#1C1C1C" opacity="0" />

                    <circle class="splash-land" id="splash-land-1" cx="300" cy="240" r="4" fill="#1C1C1C" opacity="0" />
                    <circle class="splash-land" id="splash-land-2" cx="300" cy="240" r="5" fill="#1C1C1C" opacity="0" />
                    <circle class="splash-land" id="splash-land-3" cx="300" cy="240" r="3" fill="#1C1C1C" opacity="0" />
                    <circle class="splash-land" id="splash-land-4" cx="300" cy="240" r="3.5" fill="#1C1C1C"
                        opacity="0" />
                    <circle class="splash-land" id="splash-land-5" cx="300" cy="240" r="2.5" fill="#1C1C1C"
                        opacity="0" />
                </g>

            </g> <!-- FIN DEL GRUPO DE LA TAZA -->

            <!-- GOTA PRINCIPAL -->
            <g id="drop-group" opacity="0">
                <circle cx="300" cy="60" r="9" fill="#1C1C1C" />
                <circle cx="297" cy="57" r="2.5" fill="#FFFFFF" opacity="0.3" />
            </g>

            <!-- Partículas flotantes aromáticas -->
            <g id="floating-particles">
                <circle class="float-part" id="fp-1" cx="290" cy="240" r="2.5" fill="#1C1C1C" opacity="0" />
                <circle class="float-part" id="fp-2" cx="310" cy="240" r="1.5" fill="#1C1C1C" opacity="0" />
                <circle class="float-part" id="fp-3" cx="280" cy="240" r="2" fill="#1C1C1C" opacity="0" />
                <circle class="float-part" id="fp-4" cx="320" cy="240" r="1.5" fill="#1C1C1C" opacity="0" />
                <circle class="float-part" id="fp-5" cx="300" cy="240" r="3" fill="#1C1C1C" opacity="0" />
            </g>

        </svg>
    </div>

    <script>
        gsap.set("#master-cup", { transformOrigin: "300 380" });
        gsap.set(["#top-opening", "#liquid-bulge-group", "#liquid-surface-container"], { transformOrigin: "300 240" });
        gsap.set("#cup-bottom-group", { transformOrigin: "300 374" });
        gsap.set("#shadow", { transformOrigin: "300 460" });
        gsap.set("#handle-group", { transformOrigin: "350 300" });
        gsap.set("#handle-shadow", { x: -5, y: 5 });

        // Animación continua de burbujas
        gsap.to("#liquid-bubbles circle", {
            y: -10,
            x: "+=2",
            scale: 0.2,
            opacity: 0,
            duration: 1.8,
            stagger: {
                each: 0.4,
                repeat: -1,
            },
            ease: "power1.in"
        });

        // Línea de tiempo principal
        const tl = gsap.timeline({ repeat: -1, repeatDelay: 1.6 });

        tl.set("#drop-group", { y: -100, opacity: 1, scaleY: 1, scaleX: 1 })
            .set("#master-cup", { y: 0, rotation: 0, scaleY: 1, scaleX: 1 })
            .set("#shadow", { x: 0, scale: 1, opacity: 1 })
            .set("#top-opening", { scaleY: 1, opacity: 1 })
            .set("#liquid-bulge-group", { scaleY: 0, opacity: 0 })
            .set("#cup-bottom-group", { scaleY: 0, opacity: 0 })
            .set(".splash, .splash-impact, .splash-land", { opacity: 0, x: 0, y: 0, scale: 1, scaleY: 1, scaleX: 1 })
            .set(".float-part", { opacity: 0, x: 0, y: 0, scale: 1 })
            .set("#liquid-surface-container", { x: 0, y: 0, scaleX: 1, scaleY: 1, rotation: 0, opacity: 1 })
            .set("#handle-group", { x: 0, scaleX: 1, rotation: 0 })
            .set("#handle-shadow", { x: -5, y: 5 });

        // FASE 1: CAE LA GOTA
        tl.to("#drop-group", { y: 195, scaleY: 1.6, scaleX: 0.6, duration: 0.35, ease: "power2.in" })
            .set("#drop-group", { opacity: 0 });

        const impact = tl.recent().endTime();

        // ==========================================
        // ESTADO 1 (IMPACTO Fuerte)
        // ==========================================
        tl.to("#master-cup", { y: 20, scaleY: 0.88, scaleX: 1.06, rotation: -4, duration: 0.15, ease: "power2.out" }, impact)
            .to("#shadow", { x: 15, scale: 0.85, duration: 0.15, ease: "power2.out" }, impact)
            .to("#top-opening", { scaleY: 0, opacity: 0, duration: 0.1 }, impact)
            .to("#handle-group", { x: -3, scaleX: 0.95, duration: 0.15, ease: "power2.out" }, impact)
            .to("#liquid-bulge-group", { scaleY: 1, opacity: 1, duration: 0.2, ease: "back.out(1.5)" }, impact)
            .to("#cup-bottom-group", { scaleY: 2.2, opacity: 1, duration: 0.2, ease: "power2.out" }, impact)

            // Salpicaduras de impacto
            .set(".splash-impact", { opacity: 1, x: 0, y: 0, scaleX: 1.5, scaleY: 0.5 }, impact)
            .to("#splash-imp-1", { x: -65, y: -60, duration: 0.3, ease: "power2.out" }, impact)
            .to("#splash-imp-2", { x: 55, y: -50, duration: 0.25, ease: "power2.out" }, impact)
            .to("#splash-imp-3", { x: -25, y: -70, duration: 0.35, ease: "power2.out" }, impact)
            .to("#splash-imp-4", { x: -80, y: -40, duration: 0.35, ease: "power2.out" }, impact)
            .to("#splash-imp-5", { x: 75, y: -35, duration: 0.3, ease: "power2.out" }, impact)
            .to("#splash-imp-6", { x: 15, y: -95, duration: 0.4, ease: "power2.out" }, impact)
            .to(".splash-impact", { opacity: 0, duration: 0.15 }, impact + 0.15);


        // ==========================================
        // ESTADO 2 (SALTO Y ROTACIÓN AÉREA)
        // ==========================================
        const rebound = impact + 0.45;

        tl.to("#master-cup", { y: 25, scaleY: 0.8, scaleX: 1.1, rotation: -6, duration: 0.15, ease: "power2.in" }, rebound - 0.15)
            .to("#master-cup", { y: -90, rotation: 35, scaleY: 1.08, scaleX: 0.95, duration: 0.45, ease: "power2.out" }, rebound)
            .to("#shadow", { x: -30, scale: 0.5, opacity: 0.4, duration: 0.45, ease: "power2.out" }, rebound)
            .to("#handle-group", { x: -18, scaleX: 0.75, rotation: 5, duration: 0.45, ease: "power2.out" }, rebound)
            .to("#top-opening", { scaleY: 1, opacity: 1, duration: 0.3, ease: "power2.out" }, rebound)
            .to("#liquid-bulge-group", { scaleY: 0, opacity: 0, duration: 0.25, ease: "power2.in" }, rebound)
            .to("#cup-bottom-group", { scaleY: 0, opacity: 0, duration: 0.15 }, rebound)

            // GOTAS HEREDANDO EL GIRO DE LA TAZA (Garantizado que no se salen ni caen vertical)
            .set(".splash", { opacity: 1, x: 0, y: 0, scaleX: 0.6, scaleY: 1.8 }, rebound)
            .to("#splash-1", { y: -130, x: -10, duration: 0.45, ease: "power2.out" }, rebound)
            .to("#splash-2", { y: -80, x: -35, duration: 0.35, ease: "power2.out" }, rebound)
            .to("#splash-3", { y: -100, x: 25, duration: 0.4, ease: "power2.out" }, rebound)
            .to("#splash-4", { y: -120, x: -50, duration: 0.4, ease: "power2.out" }, rebound)
            .to("#splash-5", { y: -60, x: 45, duration: 0.35, ease: "power2.out" }, rebound)
            .to("#splash-6", { y: -150, x: 10, duration: 0.5, ease: "power2.out" }, rebound);


        // ==========================================
        // ESTADO 3 (ATERRIZAJE Y OLEAJE)
        // ==========================================
        const settle = rebound + 0.55;
        const landTime = 0.6;

        tl.to("#master-cup", { y: 0, rotation: 0, scaleY: 1.1, scaleX: 0.95, duration: landTime - 0.1, ease: "power2.in" }, settle)
            .to("#shadow", { x: 0, scale: 1, opacity: 1, duration: landTime, ease: "power2.inOut" }, settle)

            .to("#master-cup", { y: 8, scaleY: 0.85, scaleX: 1.12, duration: 0.15, ease: "power2.out" }, settle + landTime - 0.1)
            .to("#master-cup", { y: 0, scaleY: 1, scaleX: 1, duration: 0.5, ease: "elastic.out(1.2, 0.4)" }, settle + landTime + 0.05)
            .to("#handle-group", { x: 0, scaleX: 1, rotation: 0, duration: landTime + 0.4, ease: "sine.inOut" }, settle)

            .to(".splash", { y: -10, x: 0, scale: 0, opacity: 0, duration: 0.4, ease: "power2.in" }, settle)

            // EL LÍQUIDO SE AGITA (Solo rotación y escala para el rebote, sin hundirse revelando huecos)
            .to("#liquid-surface-container", { rotation: 10, scaleX: 1.05, scaleY: 0.8, duration: 0.2, ease: "power2.out" }, settle + landTime - 0.1)
            .to("#liquid-surface-container", { rotation: -5, scaleX: 0.96, scaleY: 1.1, duration: 0.3, ease: "back.out(1.2)" }, settle + landTime + 0.1)
            .to("#liquid-surface-container", { rotation: 2, scaleX: 1.01, scaleY: 0.95, duration: 0.35, ease: "sine.inOut" }, settle + landTime + 0.4)
            .to("#liquid-surface-container", { rotation: 0, scaleX: 1, scaleY: 1, duration: 0.4, ease: "sine.out" }, settle + landTime + 0.75)

            // Pequeñas salpicaduras al aterrizar
            .set(".splash-land", { opacity: 1, x: 0, y: 0, scaleX: 1.3, scaleY: 0.7 }, settle + landTime - 0.1)
            .to("#splash-land-1", { x: -35, y: -30, duration: 0.25, ease: "power2.out" }, settle + landTime - 0.1)
            .to("#splash-land-2", { x: 30, y: -20, duration: 0.2, ease: "power2.out" }, settle + landTime - 0.1)
            .to("#splash-land-3", { x: -45, y: -15, duration: 0.25, ease: "power2.out" }, settle + landTime - 0.1)
            .to("#splash-land-4", { x: 45, y: -10, duration: 0.2, ease: "power2.out" }, settle + landTime - 0.1)
            .to("#splash-land-5", { x: -10, y: -45, duration: 0.3, ease: "power2.out" }, settle + landTime - 0.1)
            .to(".splash-land", { opacity: 0, scale: 0, duration: 0.15 }, settle + landTime + 0.1)

            // Partículas aromáticas que suben solas
            .set(".float-part", { opacity: 1, x: 0, y: 0, scale: 1 }, settle + landTime + 0.1)
            .to("#fp-1", { y: -50, x: -15, opacity: 0, scale: 0.5, duration: 1.2, ease: "power1.out" }, settle + landTime + 0.1)
            .to("#fp-2", { y: -40, x: 10, opacity: 0, scale: 0.5, duration: 1.5, ease: "power1.out" }, settle + landTime + 0.2)
            .to("#fp-3", { y: -55, x: -5, opacity: 0, scale: 0.5, duration: 1.3, ease: "power1.out" }, settle + landTime + 0.3)
            .to("#fp-4", { y: -35, x: 20, opacity: 0, scale: 0.5, duration: 1.4, ease: "power1.out" }, settle + landTime + 0.15)
            .to("#fp-5", { y: -60, x: 5, opacity: 0, scale: 0.3, duration: 1.6, ease: "power1.out" }, settle + landTime + 0.25);

    </script>
</body>

</html>
